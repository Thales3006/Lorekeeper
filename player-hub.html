<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="css/reset.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet">
        <link href="css/pages/player-hub.css" rel="stylesheet">

        <script type="module" src="js/pages/player-hub.js"></script>
    </head>
    <body>
        <header>
            <a class="brand" href="index.html">LoreKeeper</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="campaign-hub.html">Campaign Hub</a>
                <a class="active" href="player-hub.html">Player Hub</a>
            </nav>
        </header>

        <main>
            <h1>All of your players</h1>
            <section>
                <div class="margin">
                    <form id="add-player-form">
                        <div>
                            <label for="add-player-title">Name</label>
                            <input
                                type="text"
                                id="add-player-name"
                                name="name"
                                required
                            >
                        </div>

                        <div>
                            <label for="add-player-class">Class</label>
                            <input
                                type="text"
                                id="add-player-class"
                                name="class"
                                required
                            >
                        </div>

                        <div>
                            <label for="add-player-race">Race</label>
                            <input
                                type="text"
                                id="add-player-race"
                                name="race"
                                required
                            >
                        </div>

                        <div>
                            <label for="add-player-alignment">Alignment</label>
                            
                            <select id="add-player-alignment" name="alignment" required>
                              <option value="lawful-good">Lawful Good</option>
                              <option value="lawful-neutral">Lawful Neutral</option>
                              <option value="lawful-evil">Lawful Evil</option>
                              <option value="neutral-good">Neutral Good</option>
                              <option value="true-neutral">True Neutral</option>
                              <option value="neutral-evil">Neutral Evil</option>
                              <option value="chaotic-good">Chaotic Good</option>
                              <option value="chaotic-neutral">Chaotic Neutral</option>
                              <option value="chaotic-evil">Chaotic Evil</option>
                            </select>
                            </div>

                        <button type="submit">Add Player</button>
                    </form>

                    <div id="player-list"></div>
                </div>
            </section>
        </main>
    </body>
</html>
