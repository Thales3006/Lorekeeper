<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="css/reset.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet">
        <link href="css/pages/player-hub.css" rel="stylesheet">

        <script type="module" src="js/pages/player-hub.js"></script>
    </head>
    <body>
        <header>
            <a class="brand" href="index.html">LoreKeeper</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="campaign-hub.html">Campaign Hub</a>
                <a class="active" href="player-hub.html">Player Hub</a>
            </nav>
        </header>

        <main>
            <h1>Players</h1>
            <section>
                <aside id="player-sidebar">
                    <button id="new-player-btn">New Player</button>
                    <div id="player-list"></div>
                </aside>
                <section id="player-detail">
                    <a id="back-link" href="#">&lt; Players</a>
                    <form id="player-form">
                        <div>
                            <label for="player-name">Name</label>
                            <input
                                type="text"
                                id="player-name"
                                name="name"
                                disabled
                                required
                            >
                        </div>

                        <div>
                            <label for="player-class">Class</label>
                            <input
                                type="text"
                                id="player-class"
                                name="class"
                                disabled
                                required
                            >
                        </div>

                        <div>
                            <label for="player-race">Race</label>
                            <input
                                type="text"
                                id="player-race"
                                name="race"
                                disabled
                                required
                            >
                        </div>

                        <div>
                            <label for="player-alignment">Alignment</label>
                            <select id="player-alignment" name="alignment" disabled required>
                                <option value="lawful-good">Lawful Good</option>
                                <option value="lawful-neutral">Lawful Neutral</option>
                                <option value="lawful-evil">Lawful Evil</option>
                                <option value="neutral-good">Neutral Good</option>
                                <option value="true-neutral">True Neutral</option>
                                <option value="neutral-evil">Neutral Evil</option>
                                <option value="chaotic-good">Chaotic Good</option>
                                <option value="chaotic-neutral">Chaotic Neutral</option>
                                <option value="chaotic-evil">Chaotic Evil</option>
                            </select>
                        </div>

                        <div id="form-actions">
                            <button type="button" id="edit-btn" disabled>Edit</button>
                            <button type="button" id="save-btn" hidden>Save</button>
                            <button type="button" id="discard-btn" hidden>Discard Changes</button>
                        </div>
                    </form>
                </section>
            </section>
        </main>
    </body>
</html>
