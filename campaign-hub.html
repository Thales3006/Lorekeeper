<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="css/reset.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet">
        <link href="css/pages/campaign-hub.css" rel="stylesheet">

        <script type="module" src="js/pages/campaign-hub.js"></script>
    </head>
    <body>
        <header>
            <a class="brand" href="index.html">LoreKeeper</a>
            <nav>
                <a href="index.html">Home</a>
                <a class="active" href="campaign-hub.html">Campaign Hub</a>
            </nav>
        </header>

        <main>
            <h1>All of your campaigns</h1>
            <section>
                <div class="margin">
                    <form id="add-campaign-form">
                        <div>
                            <label for="add-campaign-title">Title</label>
                            <input
                                type="text"
                                id="add-campaign-title"
                                name="title"
                                required
                            >
                        </div>

                        <div>
                            <label for="add-campaign-description">Description</label>
                            <input
                                type="text"
                                id="add-campaign-description"
                                name="description"
                                required
                            >
                        </div>

                        <button type="submit">Add Campaign</button>
                    </form>

                    <div id="campaign-list"></div>
                </div>
            </section>
        </main>

        <footer>
            <span>LoreKeeper &copy; 2026</span>
            <nav>
                <a href="index.html">Home</a>
                <a href="campaign-hub.html">Campaign Hub</a>
                <a href="https://github.com/Thales3006/LoreKeeper" target="_blank" rel="noopener">GitHub</a>
            </nav>
        </footer>
    </body>
</html>
